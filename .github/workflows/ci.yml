name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Qualidade (lint, types, testes, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Formatação (Prettier)
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Testes unitários
        run: npm run test

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "true"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"

      - name: Auditoria de dependências
        run: npm audit --omit=dev --audit-level=high || true

  secrets-scan:
    name: Varredura de segredos (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repos de organização podem exigir GITLEAKS_LICENSE (secret). Ver README.

  rls:
    name: Testes de RLS (Postgres real)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sobe o Supabase local (Docker) e aplica as migrations
        run: supabase start

      - name: Executa os testes pgTAP (RLS + lógica de autorização)
        run: supabase test db

      - name: Derruba o stack
        if: always()
        run: supabase stop
